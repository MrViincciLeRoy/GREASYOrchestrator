name: Reset Workers

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_ORCHESTRATOR_PAT }}

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - run: pip install requests

    - name: Reset workers in DB
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python - <<'EOF'
        import os, requests
        url = os.environ['SUPABASE_URL']
        key = os.environ['SUPABASE_KEY']
        h = {'apikey': key, 'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'}
        r = requests.patch(f"{url}/rest/v1/workers", headers=H,
            json={'status': 'idle', 'current_job_id': None},
            params={'status': 'eq.busy'})
        print(f"Reset workers: {r.status_code} — {r.text}")
        EOF

    - name: Delete trigger files if present
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        CHANGED=0

        if [ -f active_job.json ]; then
          git rm active_job.json
          echo "🗑 Removed active_job.json"
          CHANGED=1
        else
          echo "ℹ active_job.json not present"
        fi

        if [ -f job_complete.json ]; then
          git rm job_complete.json
          echo "🗑 Removed job_complete.json"
          CHANGED=1
        else
          echo "ℹ job_complete.json not present"
        fi

        if [ "$CHANGED" -eq 1 ]; then
          git commit -m "chore: reset — removed stale job files"
          git push
          echo "✓ Pushed cleanup commit"
        else
          echo "✓ Nothing to clean up"
        fi