name: Checker

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    paths:
      - 'active_job.json'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_ORCHESTRATOR_PAT }}

    - name: Check if active_job.json exists
      run: |
        if [ ! -f active_job.json ]; then
          echo "No active_job.json — idle, exiting"
          exit 0
        fi
        echo "active_job.json found — proceeding"

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - run: pip install requests

    - name: Run checker
      env:
        PYTHONPATH: ${{ github.workspace }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GH_TOKEN: ${{ secrets.GH_ORCHESTRATOR_PAT }}
      run: python scripts/checker.py