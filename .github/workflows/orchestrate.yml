name: Orchestrate Season

on:
  workflow_dispatch:
    inputs:
      season_name:
        description: 'Season name (e.g. Knight_King_S1)'
        required: true
        default: 'Knight_King_S1'
      series_url:
        description: 'AsuraComics series URL'
        required: true
      total_chapters:
        description: 'Total chapters to process'
        required: true
        default: '1'
      start_chapter:
        description: 'First chapter number'
        required: false
        default: '1'
      max_workers:
        description: 'Max workers (0 = all available)'
        required: false
        default: '0'

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_ORCHESTRATOR_PAT }}

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: pip

    - run: pip install requests

    - name: Run orchestrator
      env:
        PYTHONPATH: ${{ github.workspace }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GITHUB_TOKEN: ${{ secrets.GH_ORCHESTRATOR_PAT }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        JOB_STARTED_AT: ${{ github.event.repository.updated_at }}
      run: |
        JOB_STARTED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        export JOB_STARTED_AT

        python scripts/run.py \
          --season "${{ github.event.inputs.season_name }}" \
          --series-url "${{ github.event.inputs.series_url }}" \
          --total-chapters ${{ github.event.inputs.total_chapters }} \
          --start-chapter ${{ github.event.inputs.start_chapter }} \
          --workers ${{ github.event.inputs.max_workers }}
